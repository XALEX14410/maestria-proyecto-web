spring.application.name=backend-app
spring.config.import=optional:file:.env[.properties], optional:file:./backend-app/.env[.properties]

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 1. Pasamos nuestra llave de Groq
spring.ai.openai.api-key=${GROQ_API_KEY}

# 2. EL TRUCO: Cambiamos la URL base hacia los servidores de Groq
spring.ai.openai.base-url=https://api.groq.com/openai
# 3. Elegimos el modelo de Meta (Llama 3) que ofrece Groq gratis
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
